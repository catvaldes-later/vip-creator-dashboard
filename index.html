  if (daysSinceClose > 8) return "ghosted";

};

const parseCreators = rawData => {
  const today = new Date("2026-02-25");
  return rawData.filter(c => {
    const endDate = c.properties.mvp_contract_end_date ? new Date(c.properties.mvp_contract_end_date) : null;
    const startDate = c.properties.mvp_contract_start_date ? new Date(c.properties.mvp_contract_start_date) : null;
    // Include if contract end date is in future or no end date but has start date
    return endDate && endDate >= today || startDate && !endDate;
  }).map(c => {
    const props = c.properties;
    const firstname = props.firstname || "";
    const lastname = props.lastname || "";
    const name = `${firstname} ${lastname}`.trim();
    const weekCgmv = parseFloat(props.c_gmv_last_7_days) || 0;
    const week14Cgmv = parseFloat(props.c_gmv_last_14_days) || 0;
    const prevWeekCgmv = week14Cgmv - weekCgmv;
    const allTimeCgmv = parseFloat(props.total_gmv) || 0;
    const weekLinks = parseFloat(props.links_created_last_7_days) || 0;
    const totalLinks = parseFloat(props.total_links_created) || 0;
    const wowCgmv = prevWeekCgmv > 0 ? (weekCgmv / prevWeekCgmv - 1) * 100 : weekCgmv > 0 ? 100 : 0;

    // Extract AM first name
    const amText = props.am_name_text_field || "Unknown";
    const amFirstName = amText.split(" ")[0];

    // Calculate month
    const startDateObj = props.mvp_contract_start_date ? new Date(props.mvp_contract_start_date) : null;
    let month = "Month ?";
    if (startDateObj) {
      const months = Math.floor((today - startDateObj) / (1000 * 60 * 60 * 24 * 30));
      month = `Month ${Math.max(1, months)}`;
    }

    // Calculate risk
    let risk = "good-standing";
    if (weekCgmv > 0 && wowCgmv >= -10) risk = "good-standing";else if (wowCgmv > 20 && weekCgmv > 0) risk = "tracking-up";else if (wowCgmv < -20 && weekCgmv > 0) risk = "tracking-down";else if (wowCgmv < -30 || weekCgmv === 0 && prevWeekCgmv > 0) risk = "medium-risk";else if (weekCgmv === 0 && prevWeekCgmv === 0) risk = "high-risk";
    const endDate = props.mvp_contract_end_date ? new Date(props.mvp_contract_end_date) : null;
    if (endDate && endDate < today) risk = "contract-complete";

    // Brand info
    const topBrand = props.n1_brand_by_links_created || "Unknown";
    const topBrands = [props.n1_brand_by_links_created, props.n2_brand_by_links_created, props.n3_brand_by_links_created].filter(Boolean);
    return {
      id: c.id,
      name,
      weekCgmv,
      prevWeekCgmv,
      allTimeCgmv,
      weekLinks,
      totalLinks,
      wowCgmv: Math.round(wowCgmv * 10) / 10,
      am: amFirstName,
      month,
      risk,
      contract: startDateObj ? startDateObj.toLocaleDateString('en-US', {

        const niche = props.creator_niche || "";
        if (!niche) return [];
        const cleaned = niche.split(";").map(s => s.trim()).filter(Boolean).map(v => {
          if (v === "Family + Parenting") return "Fashion";
          if (v === "Home decor / DIY") return "Home/DIY";
          if (v === "Home decor") return "Home/DIY";
          if (v === "Deals / Sales") return "Deals/Sales";
          if (v === "Fitness/Health + Wellness") return "Fitness/Health";
          if (v === "Generalist") return null;
          return v;
        }).filter(Boolean);
        return cleaned.length === 0 && niche === "Generalist" ? [] : cleaned;
      })(),
      topBrand,
      topBrands,
