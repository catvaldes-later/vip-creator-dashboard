    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0B11;
            color: #F1F1F5;
            overflow-x: hidden;
        }

        .dashboard {
            min-height: 100vh;
            padding: 24px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2A2A3C;
        }

        .header-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #A855F7 0%, #2DD4BF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: #9CA3AF;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .header-meta {
            font-size: 12px;
            color: #6B7280;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 1px solid #2A2A3C;
            overflow-x: auto;
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            color: #9CA3AF;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #F1F1F5;
        }

        .tab-btn.active {
            color: #A855F7;
            border-bottom-color: #A855F7;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            gap: 24px;
            margin-bottom: 24px;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .grid-5 {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .mini-stat {
            background: #14141E;
            border: 1px solid #2A2A3C;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .mini-stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #A855F7;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .mini-stat-label {
            font-size: 12px;
            color: #9CA3AF;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card {
            background: #14141E;
            border: 1px solid #2A2A3C;
            border-radius: 12px;
            padding: 24px;
        }

        .card-alt {
            background: #1C1C2A;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #F1F1F5;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-top: 16px;
        }

        .table th {
            background: #1C1C2A;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #9CA3AF;
            border-bottom: 1px solid #2A2A3C;
            position: sticky;
            top: 0;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #2A2A3C;
        }

        .table tbody tr:hover {
            background: #1C1C2A;
        }

        .trend-up {
            color: #2DD4BF;
        }

        .trend-down {
            color: #F87171;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-am-amina {
            background: rgba(168, 85, 247, 0.2);
            color: #D8B4FE;
        }

        .badge-am-marg {
            background: rgba(45, 212, 191, 0.2);
            color: #99F6E4;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2A2A3C;
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2DD4BF 0%, #A855F7 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .funnel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .funnel-stage {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1C1C2A;
            border-left: 4px solid #A855F7;
            border-radius: 8px;
        }

        .funnel-stage.call-set { border-left-color: #2DD4BF; }
        .funnel-stage.negotiating { border-left-color: #A855F7; }
        .funnel-stage.contract-sent { border-left-color: #FBBF24; }
        .funnel-stage.closed-won { border-left-color: #34D399; }
        .funnel-stage.closed-lost { border-left-color: #F87171; }

        .funnel-bar {
            flex: 1;
            height: 32px;
            background: linear-gradient(90deg, #A855F7, #2DD4BF);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #1C1C2A;
            border: 1px solid #2A2A3C;
            color: #9CA3AF;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #A855F7;
            color: #A855F7;
        }

        .filter-btn.active {
            background: #A855F7;
            border-color: #A855F7;
            color: white;
        }

        .creator-card {
            background: #1C1C2A;
            border: 1px solid #2A2A3C;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .creator-card:hover {
            border-color: #A855F7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .creator-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: #F1F1F5;
        }

        .creator-meta {
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        .creator-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .creator-stat-label {
            color: #9CA3AF;
        }

        .creator-stat-value {
            color: #A855F7;
            font-weight: 600;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1C1C2A;
            border-radius: 8px;
            border-left: 3px solid #A855F7;
        }

        .leaderboard-rank {
            font-size: 18px;
            font-weight: 800;
            color: #FBBF24;
            min-width: 30px;
        }

        .leaderboard-rank.top-3 {
            color: #FBBF24;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .leaderboard-meta {
            font-size: 12px;
            color: #9CA3AF;
        }

        .leaderboard-value {
            text-align: right;
        }

        .leaderboard-gmv {
            font-size: 16px;
            font-weight: 700;
            color: #A855F7;
        }

        .leaderboard-trend {
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 16px;
            }

            .header-title {
                font-size: 24px;
            }

                grid-template-columns: 1fr;
            }

            .table {
                font-size: 12px;
            }

            .table th, .table td {
                padding: 8px;
            }
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: #6B7280;
            font-size: 12px;
            border-top: 1px solid #2A2A3C;
            margin-top: 40px;
        }
    </style>

                if (sortBy === 'name') return a.display_name.localeCompare(b.display_name);
                return 0;
            });

            const topPerformers = [...CREATORS_DATA]
                .sort((a, b) => (b.c_gmv_this_quarter || 0) - (a.c_gmv_this_quarter || 0))
                .slice(0, 10);

            return (
                <div>
                    <div className="card" style={{marginBottom: '24px'}}>
                        <div className="card-title">🏆 Top 10 Performers This Quarter</div>
                        <div className="leaderboard">
                            {topPerformers.map((creator, idx) => (
                                <div key={creator.user_id} className="leaderboard-item">
                                    <div className="leaderboard-rank">{idx + 1}</div>
                                    <div className="leaderboard-info">
                                        <div className="leaderboard-name">{creator.display_name}</div>
                                        <div className="leaderboard-meta">{creator.am_name}</div>
                                    </div>
                                    <div className="leaderboard-value">
                                        <div className="leaderboard-gmv">{formatMoney(creator.c_gmv_this_quarter)}</div>
                                        <div className="leaderboard-trend" style={{display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '4px'}}>
                                            {getTrendArrow(creator.n7d_vs_14d_gmv_change)}
                                            {Math.abs(creator.n7d_vs_14d_gmv_change * 100).toFixed(1)}%
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{marginBottom: '24px'}}>
                        <div style={{marginBottom: '16px', display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap'}}>
                            <input
                                type="text"
                                placeholder="Search creators..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                style={{
                                    padding: '8px 12px',
                                    background: '#1C1C2A',
                                    border: '1px solid #2A2A3C',
                                    borderRadius: '8px',
                                    color: '#F1F1F5',
                                    fontSize: '14px',
                                    flex: '1',
                                    minWidth: '200px'
                                }}
                            />
                            <div className="filter-group" style={{margin: 0}}>
                                <button className={"filter-btn" + (sortBy === 'c-gmv-q' ? ' active' : '')} onClick={() => setSortBy('c-gmv-q')}>C-GMV This Q</button>
                                <button className={"filter-btn" + (sortBy === 'gmv-7d' ? ' active' : '')} onClick={() => setSortBy('gmv-7d')}>GMV 7d</button>
                                <button className={"filter-btn" + (sortBy === 'name' ? ' active' : '')} onClick={() => setSortBy('name')}>Name</button>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-2">
                        {sorted.map(creator => (
                            <div key={creator.user_id} className="card-alt" style={{borderRadius: '12px', padding: '16px'}}>
                                <div style={{marginBottom: '12px'}}>
                                    <div className="creator-name">{creator.display_name}</div>
                                    <div className="creator-meta">{creator.am_name}</div>
                                </div>

                                <div style={{fontSize: '13px', marginBottom: '12px', padding: '8px', background: '#14141E', borderRadius: '8px'}}>
                                    <div style={{color: '#2DD4BF', fontWeight: 600, marginBottom: '4px'}}>This Quarter: {formatMoney(creator.c_gmv_this_quarter)}</div>
                                    <div style={{color: '#A855F7', fontSize: '12px'}}>Trend: {getTrendArrow(creator.n7d_vs_14d_gmv_change)} {Math.abs(creator.n7d_vs_14d_gmv_change * 100).toFixed(1)}%</div>
                                </div>

                                <div className="creator-stat">
                                    <span className="creator-stat-label">Commission MTD:</span>
                                    <span className="creator-stat-value">{formatMoney(creator.commission_earned_month_to_date)}</span>
                                </div>
                                <div className="creator-stat">
                                    <span className="creator-stat-label">Total Links:</span>
                                    <span className="creator-stat-value">{formatNumber(creator.links_created_last_7_days)}</span>
                                </div>
                                <div className="creator-stat">
                                    <span className="creator-stat-label">Activation Score:</span>
                                    <span className="creator-stat-value">{creator.creator_activation_score || 'N/A'}</span>
                                </div>

                                {creator.instagram_handle && (
                                    <div className="creator-stat">
                                        <span className="creator-stat-label">@{creator.instagram_handle.replace(/^@/, '')}</span>
                                        <span className="creator-stat-value">{formatNumber(creator.instagram_followers)}</span>
                                    </div>
                                )}

                                <div style={{marginTop: '12px', paddingTop: '12px', borderTop: '1px solid #2A2A3C', fontSize: '12px'}}>
                                    <div style={{color: '#9CA3AF', marginBottom: '4px'}}>Top Brands:</div>
                                    <div style={{color: '#F1F1F5', fontSize: '11px'}}>
                                        {[creator.n1_brand, creator.n2_brand, creator.n3_brand].filter(b => b).map((brand, i) => (
                                            <div key={i}>{i+1}. {brand}</div>
                                        ))}
                                    </div>
                                </div>

                                <div style={{marginTop: '8px', fontSize: '11px', color: '#6B7280'}}>
                                    Contract: {formatDate(creator.mvp_contract_start_date)} → {formatDate(creator.mvp_contract_end_date)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function VIPPipeline() {
            const stages = ['Call Set', 'Negotiating', 'Contract Sent', 'Closed Won', 'Closed Lost'];
            const maxCount = Math.max(...stages.map(s => (DEALS_BY_STAGE[s] || []).length));
            const totalActive = ['Call Set', 'Negotiating', 'Contract Sent'].reduce((sum, s) => sum + (DEALS_BY_STAGE[s] || []).length, 0);
            const totalClosed = (DEALS_BY_STAGE['Closed Won'] || []).length + (DEALS_BY_STAGE['Closed Lost'] || []).length;

            return (
                <div>
                    <div className="grid grid-4" style={{marginBottom: '24px'}}>
                        <MiniStat value={totalActive} label="Active Pipeline" />
                        <MiniStat value={DEALS_BY_STAGE['Closed Won']?.length || 0} label="Closed Won" />
                        <MiniStat value={DEALS_BY_STAGE['Closed Lost']?.length || 0} label="Closed Lost" />
                        <MiniStat value={totalClosed} label="Total Closed" />
                    </div>

                    <div className="card">
                        <div className="card-title">Pipeline Funnel</div>
                        <div className="funnel">
                            {stages.map(stage => {
                                const deals = DEALS_BY_STAGE[stage] || [];
                                const count = deals.length;
                                const pct = maxCount > 0 ? Math.round((count / maxCount) * 100) : 0;
                                const stageClass = stage.toLowerCase().replace(' ', '-');

                                return (
                                    <div key={stage} className={`funnel-stage ${stageClass}`}>
                                        <div style={{minWidth: '120px', fontWeight: 600}}>{stage}</div>
                                        <div style={{flex: 1}}>
                                            <div style={{display: 'flex', alignItems: 'center', height: '24px', background: '#2A2A3C', borderRadius: '4px', overflow: 'hidden'}}>
                                                <div style={{height: '100%', width: pct + '%', background: 'linear-gradient(90deg, #A855F7, #2DD4BF)', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontSize: '12px', fontWeight: 600}}>
                                                    {pct > 0 && pct}%
                                                </div>
                                            </div>
                                        </div>
                                        <div style={{minWidth: '60px', textAlign: 'right', fontWeight: 700, fontSize: '16px', color: '#A855F7'}}>{count}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="grid grid-2" style={{marginTop: '24px'}}>
                        {stages.map(stage => {
                            const deals = DEALS_BY_STAGE[stage] || [];
                            return (
                                <div key={stage} className="card">
                                    <div className="card-title">{stage} ({deals.length})</div>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '400px', overflowY: 'auto'}}>
                                        {deals.slice(0, 10).map(deal => (
                                            <div key={deal.id} style={{background: '#1C1C2A', padding: '8px', borderRadius: '6px', fontSize: '12px', borderLeft: '3px solid #A855F7'}}>
                                                <div style={{fontWeight: 600, marginBottom: '2px', color: '#F1F1F5'}}>{deal.dealname}</div>
                                                {deal.amount > 0 && <div style={{color: '#2DD4BF'}}>{formatMoney(deal.amount)}</div>}
                                                {deal.closedate && <div style={{color: '#9CA3AF', fontSize: '11px'}}>{formatDate(deal.closedate)}</div>}
                                            </div>
                                        ))}
                                        {deals.length > 10 && (
                                            <div style={{color: '#9CA3AF', fontSize: '12px', textAlign: 'center', padding: '8px'}}>
                                                +{deals.length - 10} more
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function AminaTab() {
            const aminaCreators = CREATORS_DATA.filter(c => c.am_name === 'Amina Butt');
            const totalCGMV = aminaCreators.reduce((sum, c) => sum + c.c_gmv_this_quarter, 0);
            const avgCGMV = aminaCreators.length > 0 ? totalCGMV / aminaCreators.length : 0;
            const activeCount = aminaCreators.length;

            return (
                <div>
                    <div className="grid grid-4" style={{marginBottom: '24px'}}>
                        <MiniStat value={activeCount} label="Creators" />
                        <MiniStat value={formatMoney(totalCGMV)} label="Total C-GMV This Q" />
                        <MiniStat value={formatMoney(avgCGMV)} label="Avg C-GMV" />
                        <MiniStat value={formatMoney(aminaCreators.reduce((s,c) => s + c.commission_earned_month_to_date, 0))} label="Total Commission MTD" />
                    </div>

                    <div className="grid grid-2">
                        {aminaCreators.sort((a, b) => (b.c_gmv_this_quarter || 0) - (a.c_gmv_this_quarter || 0)).map(creator => (
                            <div key={creator.user_id} className="card-alt" style={{borderRadius: '12px', padding: '16px', borderLeft: '4px solid #A855F7'}}>
                                <div style={{fontWeight: 600, marginBottom: '4px'}}>{creator.display_name}</div>
                                <div style={{fontSize: '12px', color: '#2DD4BF', marginBottom: '12px', fontWeight: 600}}>C-GMV Q: {formatMoney(creator.c_gmv_this_quarter)}</div>
                                <div style={{fontSize: '12px', color: '#9CA3AF', marginBottom: '8px'}}>Total All-Time: {formatMoney(creator.total_gmv)}</div>
                                <div style={{padding: '8px', background: '#14141E', borderRadius: '6px', fontSize: '12px', marginTop: '8px'}}>
                                    <div>Commission MTD: <span style={{color: '#A855F7', fontWeight: 600}}>{formatMoney(creator.commission_earned_month_to_date)}</span></div>
                                    <div style={{marginTop: '4px'}}>Total Commissions: <span style={{color: '#A855F7', fontWeight: 600}}>{formatMoney(creator.total_user_commissions)}</span></div>
                                </div>
                                <div style={{fontSize: '11px', color: '#6B7280', marginTop: '8px'}}>Clicks 7d: {formatNumber(creator.clicks_last_7_days)}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function MargTab() {
            const margCreators = CREATORS_DATA.filter(c => c.am_name === 'Marguerite Meyers');
            const totalCGMV = margCreators.reduce((sum, c) => sum + c.c_gmv_this_quarter, 0);
            const avgCGMV = margCreators.length > 0 ? totalCGMV / margCreators.length : 0;
            const activeCount = margCreators.length;

            return (
                <div>
                    <div className="grid grid-4" style={{marginBottom: '24px'}}>
                        <MiniStat value={activeCount} label="Creators" />
                        <MiniStat value={formatMoney(totalCGMV)} label="Total C-GMV This Q" />
                        <MiniStat value={formatMoney(avgCGMV)} label="Avg C-GMV" />
                        <MiniStat value={formatMoney(margCreators.reduce((s,c) => s + c.commission_earned_month_to_date, 0))} label="Total Commission MTD" />
                    </div>

                    <div className="grid grid-2">
                        {margCreators.sort((a, b) => (b.c_gmv_this_quarter || 0) - (a.c_gmv_this_quarter || 0)).map(creator => (
                            <div key={creator.user_id} className="card-alt" style={{borderRadius: '12px', padding: '16px', borderLeft: '4px solid #2DD4BF'}}>
                                <div style={{fontWeight: 600, marginBottom: '4px'}}>{creator.display_name}</div>
                                <div style={{fontSize: '12px', color: '#2DD4BF', marginBottom: '12px', fontWeight: 600}}>C-GMV Q: {formatMoney(creator.c_gmv_this_quarter)}</div>
                                <div style={{fontSize: '12px', color: '#9CA3AF', marginBottom: '8px'}}>Total All-Time: {formatMoney(creator.total_gmv)}</div>
                                <div style={{padding: '8px', background: '#14141E', borderRadius: '6px', fontSize: '12px', marginTop: '8px'}}>
                                    <div>Commission MTD: <span style={{color: '#2DD4BF', fontWeight: 600}}>{formatMoney(creator.commission_earned_month_to_date)}</span></div>
                                    <div style={{marginTop: '4px'}}>Total Commissions: <span style={{color: '#2DD4BF', fontWeight: 600}}>{formatMoney(creator.total_user_commissions)}</span></div>
                                </div>
                                <div style={{fontSize: '11px', color: '#6B7280', marginTop: '8px'}}>Clicks 7d: {formatNumber(creator.clicks_last_7_days)}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ActivationPlaybook() {
            const byGoalStatus = {
                allAchieved: CREATORS_DATA.filter(c => c.mvp_period_1_goal_achieved && c.mvp_period_2_goal_achieved && c.mvp_period_3_goal_achieved),
                someAchieved: CREATORS_DATA.filter(c => !( c.mvp_period_1_goal_achieved && c.mvp_period_2_goal_achieved && c.mvp_period_3_goal_achieved) && (c.mvp_period_1_goal_achieved || c.mvp_period_2_goal_achieved || c.mvp_period_3_goal_achieved)),
                noneAchieved: CREATORS_DATA.filter(c => !(c.mvp_period_1_goal_achieved || c.mvp_period_2_goal_achieved || c.mvp_period_3_goal_achieved)),
            };

            const allAchievedCGMV = byGoalStatus.allAchieved.reduce((s, c) => s + c.c_gmv_this_quarter, 0);
            const someAchievedCGMV = byGoalStatus.someAchieved.reduce((s, c) => s + c.c_gmv_this_quarter, 0);
            const noneAchievedCGMV = byGoalStatus.noneAchieved.reduce((s, c) => s + c.c_gmv_this_quarter, 0);

            return (
                <div>
                    <div className="grid grid-3" style={{marginBottom: '24px'}}>
                        <div className="card" style={{borderLeft: '4px solid #2DD4BF'}}>
                            <div className="card-title" style={{color: '#2DD4BF'}}>All Goals Achieved</div>
                            <div style={{fontSize: '24px', fontWeight: 700, color: '#2DD4BF', marginBottom: '4px'}}>{byGoalStatus.allAchieved.length}</div>
                            <div style={{fontSize: '12px', color: '#9CA3AF'}}>{formatMoney(allAchievedCGMV)} C-GMV</div>
                        </div>
                        <div className="card" style={{borderLeft: '4px solid #FBBF24'}}>
                            <div className="card-title" style={{color: '#FBBF24'}}>Some Goals Achieved</div>
                            <div style={{fontSize: '24px', fontWeight: 700, color: '#FBBF24', marginBottom: '4px'}}>{byGoalStatus.someAchieved.length}</div>
                            <div style={{fontSize: '12px', color: '#9CA3AF'}}>{formatMoney(someAchievedCGMV)} C-GMV</div>
                        </div>
                        <div className="card" style={{borderLeft: '4px solid #F87171'}}>
                            <div className="card-title" style={{color: '#F87171'}}>No Goals Achieved</div>
                            <div style={{fontSize: '24px', fontWeight: 700, color: '#F87171', marginBottom: '4px'}}>{byGoalStatus.noneAchieved.length}</div>
                            <div style={{fontSize: '12px', color: '#9CA3AF'}}>{formatMoney(noneAchievedCGMV)} C-GMV</div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-title">All Creators - Contract Period Goal Tracking</div>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Creator</th>
                                    <th>P1 Target</th>
                                    <th>P1 ✓</th>
                                    <th>P2 Target</th>
                                    <th>P2 ✓</th>
                                    <th>P3 Target</th>
                                    <th>P3 ✓</th>
                                    <th>Q C-GMV</th>
                                </tr>
                            </thead>
                            <tbody>
                                {[...byGoalStatus.allAchieved, ...byGoalStatus.someAchieved, ...byGoalStatus.noneAchieved].slice(0, 20).map(c => (
                                    <tr key={c.user_id}>
                                        <td style={{fontWeight: 600}}>{c.display_name}</td>
                                        <td>{formatMoney(c.mvp_period_1_c_gmv_target)}</td>
                                        <td style={{textAlign: 'center', color: c.mvp_period_1_goal_achieved ? '#2DD4BF' : '#F87171'}}>{c.mvp_period_1_goal_achieved ? '✓' : '✗'}</td>
                                        <td>{formatMoney(c.mvp_period_2_c_gmv_target)}</td>
                                        <td style={{textAlign: 'center', color: c.mvp_period_2_goal_achieved ? '#2DD4BF' : '#F87171'}}>{c.mvp_period_2_goal_achieved ? '✓' : '✗'}</td>
                                        <td>{formatMoney(c.mvp_period_3_c_gmv_target)}</td>
                                        <td style={{textAlign: 'center', color: c.mvp_period_3_goal_achieved ? '#2DD4BF' : '#F87171'}}>{c.mvp_period_3_goal_achieved ? '✓' : '✗'}</td>
                                        <td style={{fontWeight: 600, color: '#A855F7'}}>{formatMoney(c.c_gmv_this_quarter)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function Dashboard() {
            const [activeTab, setActiveTab] = useState('deep-dive');

            return (
                <div className="dashboard">
                    <div className="header">
                        <div className="header-title">Mavely VIP Creator Intelligence Dashboard v2</div>
                        <div className="header-subtitle">HubSpot-powered analytics for active VIP creators</div>
                        <div className="header-meta">
                            Data last synced: {LAST_UPDATED} | Active Creators: {STATS.total_active} | C-GMV This Q: {formatMoney(STATS.total_c_gmv_q)} | Pipeline: {STATS.active_pipeline} active deals
                        </div>
                    </div>

                    <div className="tabs">
                        {[
                            {id: 'deep-dive', label: 'Creator Deep Dive'},
                            {id: 'pipeline', label: 'VIP Pipeline'},
                            {id: 'amina', label: 'Amina'},
                            {id: 'marg', label: 'Marg'},
                            {id: 'activation', label: 'Activation Playbook'},
                        ].map(tab => (
                            <button
                                key={tab.id}
                                className={"tab-btn" + (activeTab === tab.id ? " active" : "")}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="tab-content" style={{display: activeTab === 'deep-dive' ? 'block' : 'none'}}>
                        <CreatorDeepDive />
                    </div>
                    <div className="tab-content" style={{display: activeTab === 'pipeline' ? 'block' : 'none'}}>
                        <VIPPipeline />
                    </div>
                    <div className="tab-content" style={{display: activeTab === 'amina' ? 'block' : 'none'}}>
                        <AminaTab />
                    </div>
                    <div className="tab-content" style={{display: activeTab === 'marg' ? 'block' : 'none'}}>
                        <MargTab />
                    </div>
                    <div className="tab-content" style={{display: activeTab === 'activation' ? 'block' : 'none'}}>
                        <ActivationPlaybook />
                    </div>

                    <div className="footer">
                        <div>Data Source: HubSpot API + Domo Reports</div>
                        <div>Last Updated: {LAST_UPDATED} | {STATS.total_active} Active VIP Creators | {STATS.active_pipeline} Active Pipeline Deals</div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Dashboard />, document.getElementById("root"));
    </script>
</body>
</html>
